services:
  agent:
    image: ${OPS_AGENT_IMAGE:?set OPS_AGENT_IMAGE to an immutable image tag or digest}
    restart: unless-stopped
    env_file:
      - ${OPS_AGENT_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "8010"
      DATA_DIR: /app/data
      SKILLS_DIR: /app/data/skills
      AGENT_PROMPTS_DIR: /app/data/config/agent-profiles
      SEGMENTS_FILE: /app/data/config/user-segments.json
      SCHEDULED_TASKS_FILE: /app/data/config/scheduled-tasks.json
      PUBLIC_DIR: /app/public
      LOOPIT_DATA_FILE: /app/sample-data/loopit-data.json
      API_AUTH_MODE: jwt
      TRUST_PROXY_HOPS: "1"
      STATIC_UI_ENABLED: "false"
      LANGFUSE_TRACING_ENVIRONMENT: production
      GOOGLE_APPLICATION_CREDENTIALS: /var/run/secrets/google/key.json
    ports:
      - "127.0.0.1:${OPS_AGENT_PORT:-8010}:8010"
    volumes:
      - ops-assistant-data:/app/data
      - ${GOOGLE_APPLICATION_CREDENTIALS_FILE:?set GOOGLE_APPLICATION_CREDENTIALS_FILE}:/var/run/secrets/google/key.json:ro
    read_only: true
    tmpfs:
      - /tmp:size=1g,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    stop_grace_period: 2m

volumes:
  ops-assistant-data:
