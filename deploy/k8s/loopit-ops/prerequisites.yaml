apiVersion: v1
kind: Namespace
metadata:
  name: ops-assistant-agent
  labels:
    app.kubernetes.io/name: ops-assistant-agent
    app.kubernetes.io/part-of: loopit-cloud-manager
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ops-assistant-agent-data-loopit-ops
  labels:
    app.kubernetes.io/name: ops-assistant-agent
    app.kubernetes.io/part-of: loopit-cloud-manager
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - tls
  claimRef:
    namespace: ops-assistant-agent
    name: ops-assistant-agent-data
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-0f6d4e850251241aa::fsap-0be4edf3ada56a689
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ops-assistant-agent-data
  namespace: ops-assistant-agent
  labels:
    app.kubernetes.io/name: ops-assistant-agent
    app.kubernetes.io/part-of: loopit-cloud-manager
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: ops-assistant-agent-data-loopit-ops
  resources:
    requests:
      storage: 20Gi
