<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Loopit 创作小助手</title>
<style>
  :root {
    --bg: #eceef3;
    --phone-bg: #f6f7fb;
    --brand1: #6d5efc;
    --brand2: #a78bfa;
    --me: #6d5efc;
    --me-text: #fff;
    --bot: #ffffff;
    --bot-text: #1f2330;
    --muted: #8b90a0;
    --line: #e7e9f0;
    --tool-bg: #f0f1fb;
    --tool-bd: #e0e0f7;
    --ok: #18b06b;
    --err: #e0564f;
    --shadow: 0 10px 40px rgba(40, 40, 90, .14);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    color: var(--bot-text);
  }
  .phone {
    width: 100%; max-width: 460px; height: 100vh; max-height: 920px;
    background: var(--phone-bg);
    display: flex; flex-direction: column;
    overflow: hidden; box-shadow: var(--shadow);
    border-radius: 0;
  }
  @media (min-width: 520px) { .phone { height: 88vh; border-radius: 28px; } }

  /* header */
  .header {
    background: linear-gradient(135deg, var(--brand1), var(--brand2));
    color: #fff; padding: 16px 18px; display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,.22); display: grid; place-items: center;
    font-size: 22px; backdrop-filter: blur(4px);
  }
  .h-info { line-height: 1.3; }
  .h-name { font-weight: 600; font-size: 16px; }
  .h-status { font-size: 12px; opacity: .9; display: flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ef0a3; box-shadow: 0 0 6px #4ef0a3; }
  .newchat {
    margin-left: auto; flex-shrink: 0; border: 1px solid rgba(255,255,255,.5); background: rgba(255,255,255,.16);
    color: #fff; font-size: 12.5px; padding: 6px 12px; border-radius: 16px; cursor: pointer; transition: background .15s, opacity .2s;
  }
  .newchat:hover { background: rgba(255,255,255,.28); }
  .newchat:active { transform: scale(.95); }
  .newchat:disabled { opacity: .45; cursor: default; }

  /* UID 配置栏 */
  .uidbar { flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #f0effe; border-bottom: 1px solid var(--line); }
  .uid-ic { font-size: 14px; flex-shrink: 0; }
  .uid-input { flex: 1; min-width: 0; border: 1px solid #dcdcee; border-radius: 12px; padding: 6px 11px; font: inherit; font-size: 12.5px; outline: none; background: #fff; color: var(--bot-text); }
  .uid-input:focus { border-color: var(--brand2); }
  .uid-save { flex-shrink: 0; border: none; background: var(--brand1); color: #fff; font-size: 12.5px; padding: 6px 13px; border-radius: 12px; cursor: pointer; transition: background .15s, transform .1s; }
  .uid-save:active { transform: scale(.95); }
  .uid-save.saved { background: var(--ok); }

  /* 模型选择栏 */
  .modelbar { flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: #eef0fb; border-bottom: 1px solid var(--line); }
  .mb-ic { font-size: 14px; flex-shrink: 0; }
  .mb-select { flex-shrink: 0; border: 1px solid #dcdcee; border-radius: 12px; padding: 5px 9px; font: inherit; font-size: 12.5px; background: #fff; color: var(--bot-text); outline: none; max-width: 56%; }
  .mb-select:focus { border-color: var(--brand2); }
  .mb-note { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* messages */
  .messages { flex: 1; overflow-y: auto; padding: 18px 14px 8px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
  .row { display: flex; gap: 8px; align-items: flex-end; max-width: 100%; }
  .row.me { flex-direction: row-reverse; }
  .row .a {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; font-size: 16px;
    background: linear-gradient(135deg, var(--brand1), var(--brand2)); color: #fff;
  }
  .row.me .a { background: #d7d9e3; }
  .bubble {
    max-width: 78%; padding: 10px 13px; border-radius: 16px; font-size: 14.5px; line-height: 1.55;
    word-break: break-word; white-space: normal; box-shadow: 0 1px 2px rgba(40,40,90,.05);
  }
  .me .bubble { background: var(--me); color: var(--me-text); border-bottom-right-radius: 5px; }
  .bot .bubble { background: var(--bot); color: var(--bot-text); border-bottom-left-radius: 5px; }
  .bubble p { margin: 0 0 7px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { font-weight: 700; }
  .bubble code { background: rgba(120,120,160,.14); padding: 1px 5px; border-radius: 5px; font-size: 12.5px; font-family: ui-monospace, Menlo, monospace; }
  .bubble ul { margin: 4px 0; padding-left: 18px; }
  .bubble li { margin: 2px 0; }
  .bubble .lnk { color: var(--brand1); text-decoration: none; border-bottom: 1px solid rgba(109,94,252,.4); word-break: break-all; }
  .bubble .lnk:active { opacity: .6; }

  /* Loopit 作品分享卡片 */
  .game-card { display: block; margin: 9px 0 3px; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: #fff; text-decoration: none; box-shadow: 0 2px 10px rgba(40,40,90,.10); transition: transform .1s, box-shadow .15s; }
  .game-card:active { transform: scale(.985); }
  .gc-img { display: block; width: 100%; height: 200px; object-fit: cover; object-position: center top; background: linear-gradient(135deg, #ece9fb, #f6f7fb); }
  .game-card.noimg .gc-img { display: none; }
  .gc-bar { display: flex; align-items: center; gap: 7px; padding: 10px 13px; }
  .game-card.noimg .gc-bar { padding: 14px 13px; }
  .gc-ic { font-size: 16px; flex-shrink: 0; }
  .gc-name { font-size: 13px; font-weight: 600; color: var(--bot-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gc-cta { margin-left: auto; flex-shrink: 0; font-size: 12.5px; font-weight: 600; color: var(--brand1); }

  /* tool process panel */
  .process { display: flex; flex-direction: column; gap: 6px; margin-bottom: 9px; }
  .process:empty { display: none; }
  .tool {
    display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: #555a6b;
    background: var(--tool-bg); border: 1px solid var(--tool-bd); border-radius: 10px;
    padding: 7px 10px; animation: pop .25s ease;
  }
  .tool .ic { width: 15px; height: 15px; flex-shrink: 0; display: grid; place-items: center; }
  .spinner { width: 13px; height: 13px; border: 2px solid #c7c9e8; border-top-color: var(--brand1); border-radius: 50%; animation: spin .7s linear infinite; }
  .tool.done { color: #555a6b; }
  .tool.done .label { color: #444; }
  .tick { color: var(--ok); font-weight: 700; }
  .cross { color: var(--err); font-weight: 700; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pop { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* typing */
  .typing { display: inline-flex; gap: 4px; padding: 4px 2px; }
  .typing i { width: 7px; height: 7px; border-radius: 50%; background: #c4c7d4; animation: blink 1.2s infinite both; }
  .typing i:nth-child(2){ animation-delay: .2s; } .typing i:nth-child(3){ animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{ opacity:.3; transform: translateY(0);} 40%{ opacity:1; transform: translateY(-3px);} }

  /* composer */
  .composer { flex-shrink: 0; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); background: #fff; border-top: 1px solid var(--line); display: flex; gap: 9px; align-items: flex-end; }
  .composer textarea {
    flex: 1; resize: none; border: 1px solid var(--line); border-radius: 18px; padding: 10px 14px;
    font: inherit; font-size: 14.5px; max-height: 120px; outline: none; background: var(--phone-bg); line-height: 1.4;
  }
  .composer textarea:focus { border-color: var(--brand2); background: #fff; }
  .send { width: 40px; height: 40px; flex-shrink: 0; border: none; border-radius: 50%; background: linear-gradient(135deg, var(--brand1), var(--brand2)); color: #fff; font-size: 18px; cursor: pointer; transition: transform .1s, opacity .2s; display: grid; place-items: center; }
  .send:active { transform: scale(.9); }
  .send:disabled { opacity: .45; cursor: default; }
  .hint { text-align: center; font-size: 11px; color: var(--muted); padding: 2px 0 0; }
  #costbar { font-weight: 500; }
  #costbar.has-cost { color: #6b6f7e; }
  .usage { margin-top: 7px; padding-top: 6px; border-top: 1px dashed #e9eaf2; font-size: 11px; color: #a3a7b5; }

  /* 新对话分隔线 */
  .divider { display: flex; align-items: center; gap: 10px; margin: 10px 6px 6px; color: var(--muted); font-size: 11px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .divider span { flex-shrink: 0; }
  .chips { display: flex; gap: 7px; padding: 0 12px 8px; flex-wrap: wrap; background: #fff; }
  .chip { font-size: 12px; color: var(--brand1); background: #f0effe; border: 1px solid #e4e1fd; border-radius: 14px; padding: 5px 11px; cursor: pointer; }
  .chip:active { background: #e6e3fd; }

  /* tabs */
  .tabs { flex-shrink: 0; display: flex; background: #fff; border-bottom: 1px solid var(--line); overflow-x: auto; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex: 1 0 auto; border: none; background: none; padding: 11px 9px; font: inherit; font-size: 12px; white-space: nowrap; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
  .tab.active { color: var(--brand1); border-bottom-color: var(--brand1); font-weight: 600; }
  .tab:active { background: #f6f6fb; }

  /* panels：只显示当前 tab */
  .panel { flex: 1; min-height: 0; display: none; flex-direction: column; overflow: hidden; }
  .panel.active { display: flex; }

  /* 配置/编辑器（system prompt + 文档） */
  .cfg-head { flex-shrink: 0; padding: 12px 14px 6px; font-size: 13px; font-weight: 600; color: var(--bot-text); }
  .cfg-head span { font-weight: 400; color: var(--muted); font-size: 11.5px; margin-left: 6px; }
  .cfg-editor { flex: 1; min-height: 0; margin: 0 12px; border: 1px solid var(--line); border-radius: 12px; padding: 11px; font-size: 13px; line-height: 1.55; resize: none; outline: none; background: #fff; color: var(--bot-text); font-family: ui-monospace, Menlo, "PingFang SC", monospace; }
  .cfg-editor:focus { border-color: var(--brand2); }
  .cfg-actions { flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 10px 14px calc(10px + env(safe-area-inset-bottom)); }
  .cfg-actions button { border: none; background: linear-gradient(135deg, var(--brand1), var(--brand2)); color: #fff; font-size: 13px; padding: 9px 22px; border-radius: 14px; cursor: pointer; transition: transform .1s; }
  .cfg-actions button:active { transform: scale(.97); }
  .cfg-actions .btn-secondary { background: #f0effe; color: var(--brand1); border: 1px solid #ddd9fb; }
  .cfg-status { font-size: 12px; color: var(--ok); }

  /* 文档管理工具条 */
  .docbar { flex-shrink: 0; display: flex; gap: 8px; padding: 12px 14px 6px; align-items: center; }
  .doc-select { flex: 1; min-width: 0; border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; font: inherit; font-size: 12.5px; background: #fff; outline: none; }
  .doc-btn { flex-shrink: 0; width: 36px; height: 36px; border: 1px solid var(--line); background: #fff; border-radius: 10px; font-size: 15px; cursor: pointer; }
  .doc-btn:active { transform: scale(.95); background: #f6f6fb; }
  .doc-name { margin: 0 14px 6px; border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; font: inherit; font-size: 12.5px; outline: none; background: #fff; color: var(--bot-text); }
  .doc-name:focus, .doc-select:focus { border-color: var(--brand2); }

  /* 表单式配置（定时任务 / 用户分层） */
  .form-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 14px 8px; }
  .field { display: block; margin-bottom: 11px; }
  .field > .lbl { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 9px 11px; font: inherit; font-size: 13px; outline: none; background: #fff; color: var(--bot-text); }
  .field textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--brand2); }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .field-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--bot-text); margin-bottom: 11px; cursor: pointer; }
  .field-toggle input { width: auto; }
  .field-hint { font-size: 11.5px; color: var(--muted); margin: -4px 0 11px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <div class="avatar">🐧</div>
      <div class="h-info">
        <div class="h-name">Loopit 创作小助手</div>
        <div class="h-status"><span class="dot"></span> 在线 · 陪你打磨作品</div>
      </div>
      <button class="newchat" id="newchat" title="清空并开启一段全新对话">＋ 新对话</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="chat">对话</button>
      <button class="tab" data-tab="prompt">Prompt</button>
      <button class="tab" data-tab="creator">创作指导</button>
      <button class="tab" data-tab="activity">运营活动</button>
      <button class="tab" data-tab="schedule">定时任务</button>
      <button class="tab" data-tab="segment">用户分层</button>
    </div>

    <div class="panel active" id="panel-chat">
    <div class="uidbar">
      <span class="uid-ic" title="你的创作者 UID">🎮</span>
      <input id="uidInput" class="uid-input" placeholder="填入你的创作者 UID，之后可直接问“我的作品怎么样”" />
      <button id="uidSave" class="uid-save">保存</button>
    </div>

    <div class="modelbar">
      <span class="mb-ic" title="对话模型">🧠</span>
      <select id="modelSelect" class="mb-select"></select>
      <span class="mb-note" id="modelNote"></span>
    </div>

    <div class="messages" id="messages"></div>

    <div class="chips" id="chips"></div>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="贴上你的作品链接，问我点啥…"></textarea>
      <button class="send" id="send" title="发送">➤</button>
    </div>
    <div class="hint" id="costbar">连接真实数据 · 陪你把作品做得更好</div>
    </div><!-- /panel-chat -->

    <div class="panel" id="panel-prompt">
      <div class="cfg-head">System Prompt <span>改完点保存，下次对话即生效</span></div>
      <textarea class="cfg-editor" id="promptEditor" placeholder="加载中…"></textarea>
      <div class="cfg-actions"><button id="promptSave">保存</button><span class="cfg-status" id="promptStatus"></span></div>
    </div>

    <div class="panel" id="panel-creator">
      <div class="cfg-head">创作者指导 <span>Loopit 能力 / 热榜 case / 创作技巧（agent 会读取）</span></div>
      <div class="docbar">
        <select class="doc-select" id="creator-select"></select>
        <button class="doc-btn" id="creator-new" title="新增文档">＋</button>
        <button class="doc-btn" id="creator-del" title="删除当前文档">🗑</button>
      </div>
      <input class="doc-name" id="creator-name" placeholder="文档名（字母/数字/连字符）" />
      <textarea class="cfg-editor" id="creator-editor" placeholder="选一个文档来编辑，或点 ＋ 新增…"></textarea>
      <div class="cfg-actions"><button id="creator-save">保存</button><span class="cfg-status" id="creator-status"></span></div>
    </div>

    <div class="panel" id="panel-activity">
      <div class="cfg-head">运营活动 <span>配置当前活动，创作者可问"有什么活动适合我"</span></div>
      <div class="docbar">
        <select class="doc-select" id="activity-select"></select>
        <button class="doc-btn" id="activity-new" title="新增文档">＋</button>
        <button class="doc-btn" id="activity-del" title="删除当前文档">🗑</button>
      </div>
      <input class="doc-name" id="activity-name" placeholder="文档名（字母/数字/连字符）" />
      <textarea class="cfg-editor" id="activity-editor" placeholder="选一个文档来编辑，或点 ＋ 新增…"></textarea>
      <div class="cfg-actions"><button id="activity-save">保存</button><span class="cfg-status" id="activity-status"></span></div>
    </div>

    <div class="panel" id="panel-schedule">
      <div class="cfg-head">定时任务 <span>给某个用户分层，定时发消息</span></div>
      <div class="docbar">
        <select class="doc-select" id="sched-select"></select>
        <button class="doc-btn" id="sched-new" title="新增任务">＋</button>
        <button class="doc-btn" id="sched-del" title="删除当前任务">🗑</button>
      </div>
      <div class="form-scroll">
        <label class="field"><span class="lbl">任务名</span><input id="sched-name" placeholder="比如：新用户创作引导" /></label>
        <label class="field"><span class="lbl">用户分层（发给谁）</span><select id="sched-segment"></select></label>
        <div class="field-row">
          <label class="field"><span class="lbl">频率</span><select id="sched-freq"><option value="daily">每天</option><option value="weekly">每周</option><option value="once">单次</option></select></label>
          <label class="field"><span class="lbl">发送时间</span><input type="time" id="sched-time" value="10:00" /></label>
        </div>
        <label class="field" id="sched-weekday-field"><span class="lbl">星期几</span><select id="sched-weekday"><option value="1">周一</option><option value="2">周二</option><option value="3">周三</option><option value="4">周四</option><option value="5">周五</option><option value="6">周六</option><option value="0">周日</option></select></label>
        <label class="field" id="sched-date-field"><span class="lbl">日期</span><input type="date" id="sched-date" /></label>
        <label class="field"><span class="lbl">发送内容 / 生成指令</span><textarea id="sched-prompt" placeholder="到点发给这批用户的消息，或给 agent 的生成指令"></textarea></label>
        <label class="field-toggle"><input type="checkbox" id="sched-enabled" checked /> 启用该任务</label>
        <div class="field-hint" id="sched-summary"></div>
      </div>
      <div class="cfg-actions"><button id="sched-save">保存</button><button id="sched-send-now" class="btn-secondary">⚡ 立即发送</button><span class="cfg-status" id="sched-status"></span></div>
    </div>

    <div class="panel" id="panel-segment">
      <div class="cfg-head">用户分层 <span>定义用户群，供定时任务选择（简易示意）</span></div>
      <div class="docbar">
        <select class="doc-select" id="seg-select"></select>
        <button class="doc-btn" id="seg-new" title="新增分层">＋</button>
        <button class="doc-btn" id="seg-del" title="删除当前分层">🗑</button>
      </div>
      <div class="form-scroll">
        <label class="field"><span class="lbl">分层 key（英文标识，定时任务按它引用）</span><input id="seg-key" placeholder="如 new-creators" /></label>
        <label class="field"><span class="lbl">名称</span><input id="seg-name" placeholder="如 新创作用户" /></label>
        <label class="field"><span class="lbl">定义说明（这批用户怎么圈定）</span><textarea id="seg-def" placeholder="用大白话写清人群定义，比如：近 7 天注册且发过作品的创作者"></textarea></label>
        <div class="field-hint">这是简易定义示意，描述清楚人群即可；按定义真正圈出用户的逻辑后续接入数仓查询。</div>
      </div>
      <div class="cfg-actions"><button id="seg-save">保存</button><span class="cfg-status" id="seg-status"></span></div>
    </div>
  </div>

<script>
// 同源 http(s) 用相对路径；被预览面板/文件方式(blob:/file:)打开时，回退到服务绝对地址。
const API = /^https?:$/.test(location.protocol) ? location.origin : "http://localhost:8010";
const USER_ID = "im-user";
const $msgs = document.getElementById("messages");
const $input = document.getElementById("input");
const $send = document.getElementById("send");
const $chips = document.getElementById("chips");
const $newchat = document.getElementById("newchat");
const $uidInput = document.getElementById("uidInput");
const $uidSave = document.getElementById("uidSave");

let busy = false;
// 创作者 UID：记在本地，每次对话带给 agent，让"我的作品"能直接落到 ta 名下。
const UID_KEY = "loopit_creator_uid";
const DEFAULT_UID = "2057758692073287680";          // 默认创作者 UID：没存过就用它，刷新也在
let creatorUid = localStorage.getItem(UID_KEY) || DEFAULT_UID;
$uidInput.value = creatorUid;
function saveUid(){
  creatorUid = $uidInput.value.trim();
  localStorage.setItem(UID_KEY, creatorUid);
  $uidSave.textContent = "✓ 已记住";
  $uidSave.classList.add("saved");
  setTimeout(() => { $uidSave.textContent = "保存"; $uidSave.classList.remove("saved"); }, 1500);
}

/* ---------- 轻量 markdown 渲染 ---------- */
function esc(s){ return s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function escAttr(s){ return s.replace(/&/g, "&amp;").replace(/"/g, "&quot;"); }
function sharePid(url){ const m = url.match(/^https?:\/\/share\.loopit\.me\/game\/([a-zA-Z0-9-]+)/); return m ? m[1] : null; }
function gameCardHtml(url, pid){
  const og = "https://share.loopit.me/og/game/" + pid;
  return '<a class="game-card" href="' + escAttr(url) + '" target="_blank" rel="noopener">' +
    '<img class="gc-img" src="' + og + '" loading="lazy" alt="Loopit 作品预览" ' +
    'onerror="this.closest(\'.game-card\').classList.add(\'noimg\')">' +
    '<div class="gc-bar"><span class="gc-ic">🎮</span><span class="gc-name">Loopit 作品 · 试玩看看</span>' +
    '<span class="gc-cta">打开 ›</span></div></a>';
}
function renderMd(text, withCards){
  const cards = [], tokens = [];
  const tok = html => { tokens.push(html); return "@@LNK" + (tokens.length - 1) + "@@"; };
  const addCard = url => { const pid = sharePid(url); if (pid && !cards.some(c => c.pid === pid)) cards.push({ url, pid }); return pid; };
  let t = text;
  // 1) markdown 链接 [文字](url)：抽成 token，分享链接顺带登记卡片
  t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (full, label, url) => {
    addCard(url);
    return tok('<a class="lnk" href="' + escAttr(url) + '" target="_blank" rel="noopener">' + esc(label) + '</a>');
  });
  // 2) 裸 url：分享链接从行内剥掉(只出卡片)，其它自动链接。markdown 链接已抽成 token，这里可放心全局匹配
  t = t.replace(/https?:\/\/[^\s<>()（）【】「」『』，。！？；、]+/g, rawUrl => {
    const trail = (rawUrl.match(/[.,!?:：]+$/) || [""])[0];
    const url = trail ? rawUrl.slice(0, -trail.length) : rawUrl;
    if (sharePid(url)) { addCard(url); return ""; }
    return tok('<a class="lnk" href="' + escAttr(url) + '" target="_blank" rel="noopener">' + esc(url) + '</a>') + trail;
  });
  // 3) 逐行：转义 + 加粗/斜体/代码 + 列表
  const lines = esc(t).split("\n");
  let html = "", list = false;
  const inline = s => s
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[^*])\*(?!\s)([^*]+?)\*/g, "$1<em>$2</em>")
    .replace(/`([^`]+?)`/g, "<code>$1</code>");
  for (let raw of lines){
    const line = raw.trim();
    if (/^[-•]\s+/.test(line)){
      if (!list){ html += "<ul>"; list = true; }
      html += "<li>" + inline(line.replace(/^[-•]\s+/, "")) + "</li>";
    } else {
      if (list){ html += "</ul>"; list = false; }
      if (line) html += "<p>" + inline(line) + "</p>";
    }
  }
  if (list) html += "</ul>";
  // 4) 还原链接 token；5) 末尾追加作品卡片（仅消息完成时，避免流式重复加载图片）
  html = html.replace(/@@LNK(\d+)@@/g, (m, n) => tokens[n]);
  if (withCards) for (const c of cards) html += gameCardHtml(c.url, c.pid);
  return html || "<p></p>";
}

/* 断点恢复：发消息时标记 pending，若回复没出完就刷新，刷新后从后端把回复捞回来补上 */
const PENDING_KEY = "loopit_pending_reply";
function setPending(){ localStorage.setItem(PENDING_KEY, threadId); }
function clearPending(){ localStorage.removeItem(PENDING_KEY); }
async function maybeRecoverReply(){
  if (localStorage.getItem(PENDING_KEY) !== threadId) return;     // 没有待恢复的回复
  const turn = botTurn();                                          // 先放个"恢复中"占位
  const deadline = Date.now() + 300000;                            // 最多等 5 分钟
  while (Date.now() < deadline){
    try {
      const r = await fetch(API + "/im/messages?userId=" + encodeURIComponent(USER_ID) + "&imThreadId=" + encodeURIComponent(threadId));
      const msgs = (await r.json()).messages || [];
      let lastUser = -1;
      for (let i = msgs.length - 1; i >= 0; i--){ if (msgs[i].role === "user"){ lastUser = i; break; } }
      const reply = msgs.slice(lastUser + 1).find(m => m.role === "assistant");
      if (reply){
        turn.started = true;
        turn.body.innerHTML = renderMd(reply.text, true);
        scrollDown(); clearPending(); saveTranscript();
        return;
      }
    } catch (e) { /* 网络抖动，下轮再试 */ }
    await new Promise(res => setTimeout(res, 2500));
  }
  // 超时（极少数特别慢的查询）：保留 pending，下次刷新继续捞；占位提示不入库
  turn.started = true;
  turn.body.innerHTML = renderMd("（上一条回复生成得有点久，稍后刷新一下就能看到～）");
}

function toolEnd(turn, label, ok){
  const items = [...turn.process.querySelectorAll(".tool:not(.done)")];
  const el = items.reverse().find(x => x.dataset.label === label) || items[0];
  if (!el) return;

}
function appendText(turn, delta){
  if (!turn.started){ turn.body.innerHTML = ""; turn.started = true; }
  turn.raw += delta;
  turn.body.innerHTML = renderMd(turn.raw, false);   // 流式中不渲染卡片
  scrollDown();

function finishTurn(turn, fallback){
  // 消息完成：重渲染并补上作品卡片（避免流式时反复加载预览图）
  turn.body.innerHTML = renderMd(turn.started ? turn.raw : (fallback || "（这次没拿到内容，再问我一次试试？）"), true);
  scrollDown();
  clearPending();                                     // 回复已正常收到，无需恢复
  saveTranscript();                                   // 这一来一回存下来
}

/* ---------- 与后端流式对话 ---------- */
async function ask(text){
  if (busy || !text.trim()) return;
  busy = true; setBusy(true);
  userMessage(text);
  saveTranscript();                                     // 用户消息先存，刷新也不丢
  setPending();                                          // 标记"这条回复还没收完"，刷新可恢复
  const turn = botTurn();

  try {
    const resp = await fetch(API + "/im/stream", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ userId: USER_ID, imThreadId: threadId, text, creatorUid: creatorUid || undefined, model: chatModel || undefined })
    });
    if (!resp.ok || !resp.body) throw new Error("HTTP " + resp.status);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    while (true){
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const blocks = buf.split("\n\n");
      buf = blocks.pop();                         // 末尾可能不完整
      for (const block of blocks){
        const line = block.split("\n").find(l => l.startsWith("data:"));
        if (!line) continue;
        let evt; try { evt = JSON.parse(line.slice(5).trim()); } catch { continue; }
        handle(turn, evt);
      }
    }
  } catch (err){
    turn.process.innerHTML = "";
    turn.started = true;
    turn.body.innerHTML = renderMd("哎呀，连接出了点问题：" + (err.message || err) + "。稍后再试下～");
    clearPending(); saveTranscript();
  } finally {
    busy = false; setBusy(false);
    $input.focus();
  }
}

function handle(turn, evt){
  switch (evt.type){
    case "tool_start": toolStart(turn, evt.tool || "查数据"); break;
    case "tool_end":   toolEnd(turn, evt.tool || "查数据", evt.ok); break;
    case "text_delta": if (evt.delta) appendText(turn, evt.delta); break;
    case "usage":      showUsage(turn, evt.usage); break;
    case "done":       finishTurn(turn, evt.reply && evt.reply.text); break;
    case "error":      turn.started = true; turn.body.innerHTML = renderMd("出错了：" + (evt.message || "未知错误")); break;
  }
}

const NAME_OK = /^[a-zA-Z0-9_-]{1,64}$/;
function makeDocManager(prefix, collection){
  const $sel = document.getElementById(prefix + "-select");
  const $name = document.getElementById(prefix + "-name");
  const $ed = document.getElementById(prefix + "-editor");
  const $st = document.getElementById(prefix + "-status");
  let loaded = false;
  const base = API + "/skills/" + collection + "/docs";
  async function refresh(selectName){
    const r = await fetch(base);
    const d = await r.json();
    $sel.innerHTML = "";
    (d.docs || []).forEach(doc => {
      const o = document.createElement("option");
      o.value = doc.name; o.textContent = doc.title + " (" + doc.name + ")";
      $sel.appendChild(o);
    });
    if (selectName) $sel.value = selectName;
    if ($sel.value) await load($sel.value);
    else { $name.value = ""; $name.dataset.orig = ""; $ed.value = ""; }
  }
  async function load(name){
    const r = await fetch(base + "/" + encodeURIComponent(name));
    if (!r.ok){ $ed.value = ""; return; }
    const d = await r.json();
    $name.value = d.name; $name.dataset.orig = d.name; $ed.value = d.content;
  }
  $sel.addEventListener("change", () => load($sel.value));
  $name.dataset.orig = "";
  document.getElementById(prefix + "-new").addEventListener("click", () => {
    $sel.value = ""; $name.value = ""; $name.dataset.orig = ""; $ed.value = "";
    $name.focus(); cfgStatus($st, "新文档：填名字 + 内容后点保存");
  });
  document.getElementById(prefix + "-del").addEventListener("click", async () => {
    const name = $name.dataset.orig;
    if (!name){ cfgStatus($st, "这是未保存的新文档，没什么可删", true); return; }
    if (!confirm("删除文档「" + name + "」？此操作不可撤销。")) return;
    const r = await fetch(base + "/" + encodeURIComponent(name), { method: "DELETE" });
    if (r.ok){ cfgStatus($st, "已删除"); await refresh(); } else cfgStatus($st, "删除失败", true);
  });
  document.getElementById(prefix + "-save").addEventListener("click", async () => {
    const name = ($name.value || "").trim();
    if (!NAME_OK.test(name)){ cfgStatus($st, "文档名只能用字母/数字/下划线/连字符", true); return; }
    const r = await fetch(base + "/" + encodeURIComponent(name), {
      method: "PUT", headers: { "content-type": "application/json" },
      body: JSON.stringify({ content: $ed.value })
    });
    if (r.ok){ cfgStatus($st, "✓ 已保存，agent 立刻可读"); await refresh(name); }
    else { const e = await r.json().catch(() => ({})); cfgStatus($st, "保存失败：" + (e.error || r.status), true); }
  });
  return { ensureLoaded(){ if (!loaded){ loaded = true; refresh().catch(e => cfgStatus($st, "加载失败：" + e.message, true)); } } };
}

/* 用户分层 */
const segMgr = (() => {
  const $sel = byId("seg-select"), $key = byId("seg-key"), $name = byId("seg-name"), $def = byId("seg-def"), $st = byId("seg-status");
  let idx = -1, loaded = false;
  function renderSelect(){
    $sel.innerHTML = "";
    segments.forEach((s,i)=>{ const o=document.createElement("option"); o.value=String(i); o.textContent=(s.name||"(未命名)")+" ("+(s.key||"?")+")"; $sel.appendChild(o); });
  }
  function fill(i){
    idx = i; const s = i>=0 ? segments[i] : { key:"", name:"", definition:"" };
    $key.value=s.key||""; $name.value=s.name||""; $def.value=s.definition||"";
    if(i>=0) $sel.value=String(i);
  }
  async function reload(sel){
    segments = await loadArray("/config/segments"); renderSelect();
    fill(segments.length ? (sel!=null && sel<segments.length ? sel : 0) : -1);
  }
  $sel.addEventListener("change", ()=>fill(parseInt($sel.value,10)));
  byId("seg-new").addEventListener("click", ()=>{ fill(-1); $key.focus(); cfgStatus($st,"新分层：填 key/名称/定义后保存"); });
  byId("seg-del").addEventListener("click", async ()=>{
    if(idx<0){ cfgStatus($st,"未保存的新分层，无需删除",true); return; }
    if(!confirm("删除分层「"+(segments[idx].name||segments[idx].key)+"」？")) return;
    segments.splice(idx,1); await saveArray("/config/segments",segments); cfgStatus($st,"已删除"); await reload(0);
  });
  byId("seg-save").addEventListener("click", async ()=>{
    const key=($key.value||"").trim();
    if(!NAME_OK.test(key)){ cfgStatus($st,"key 只能用字母/数字/下划线/连字符",true); return; }
    const item={ key, name:($name.value||"").trim(), definition:($def.value||"").trim() };
    if(idx>=0) segments[idx]=item; else { segments.push(item); idx=segments.length-1; }
    if(await saveArray("/config/segments",segments)){ cfgStatus($st,"✓ 已保存"); await reload(idx); } else cfgStatus($st,"保存失败",true);
  });
  return { open(){ if(!loaded){ loaded=true; reload(0).catch(e=>cfgStatus($st,"加载失败："+e.message,true)); } } };
})();

/* 定时任务 */
const schedMgr = (() => {
  const $sel=byId("sched-select"), $st=byId("sched-status");
  const $seg=byId("sched-segment"), $freq=byId("sched-freq"), $time=byId("sched-time"),
        $wd=byId("sched-weekday"), $date=byId("sched-date"), $prompt=byId("sched-prompt"),
        $name=byId("sched-name"), $en=byId("sched-enabled");
  let tasks=[], idx=-1, loaded=false;
  const WEEK=["周日","周一","周二","周三","周四","周五","周六"];
  function genId(){ return "sched_"+Math.random().toString(36).slice(2,9); }
  function renderSegOptions(){
    $seg.innerHTML="";
    if(!segments.length){ const o=document.createElement("option"); o.value=""; o.textContent="（先去用户分层加一个）"; $seg.appendChild(o); return; }
    segments.forEach(s=>{ const o=document.createElement("option"); o.value=s.key; o.textContent=s.name+" ("+s.key+")"; $seg.appendChild(o); });
  }
  function summaryText(t){
    const segName=(segments.find(s=>s.key===t.segment)||{}).name||t.segment||"?";
    const when = t.frequency==="daily" ? ("每天 "+t.time)
      : t.frequency==="weekly" ? ("每"+(WEEK[t.weekday]||"?")+" "+t.time)
      : ("单次 "+(t.date||"未选日期")+" "+t.time);
    return "⏰ "+when+" → 发给「"+segName+"」"+(t.enabled===false?"（已停用）":"");
  }
  function renderSelect(){
    $sel.innerHTML="";
    tasks.forEach((t,i)=>{ const o=document.createElement("option"); o.value=String(i); o.textContent=(t.name||"(未命名)")+(t.enabled===false?" · 停用":""); $sel.appendChild(o); });
  }
  function formToTask(){
    return { id: idx>=0 ? (tasks[idx].id||genId()) : genId(), name:($name.value||"").trim(),
      segment:$seg.value, frequency:$freq.value, time:$time.value, weekday:parseInt($wd.value,10),
      date:$date.value, prompt:$prompt.value, enabled:$en.checked };
  }
  function freqUI(){
    byId("sched-weekday-field").style.display = $freq.value==="weekly" ? "" : "none";
    byId("sched-date-field").style.display = $freq.value==="once" ? "" : "none";
    byId("sched-summary").textContent = summaryText(formToTask());
  }
  function fill(i){
    idx=i;
    const t = i>=0 ? tasks[i] : { name:"", segment:(segments[0]&&segments[0].key)||"", frequency:"daily", time:"10:00", weekday:1, date:"", prompt:"", enabled:true };
    $name.value=t.name||""; $seg.value=t.segment||""; $freq.value=t.frequency||"daily";
    $time.value=t.time||"10:00"; $wd.value=String(t.weekday!=null?t.weekday:1); $date.value=t.date||"";
    $prompt.value=t.prompt||""; $en.checked=t.enabled!==false;
    if(i>=0) $sel.value=String(i);
    freqUI();
  }
  async function reload(sel){
    tasks = await loadArray("/config/scheduled-tasks"); renderSelect();
    fill(tasks.length ? (sel!=null && sel<tasks.length ? sel : 0) : -1);
  }
  $sel.addEventListener("change", ()=>fill(parseInt($sel.value,10)));
  $freq.addEventListener("change", freqUI);
  [$time,$seg,$wd,$date,$en].forEach(el=>el.addEventListener("change", ()=>{ byId("sched-summary").textContent=summaryText(formToTask()); }));
  byId("sched-new").addEventListener("click", ()=>{ fill(-1); $name.focus(); cfgStatus($st,"新任务：填好后保存"); });
  byId("sched-del").addEventListener("click", async ()=>{
    if(idx<0){ cfgStatus($st,"未保存的新任务",true); return; }
    if(!confirm("删除任务「"+(tasks[idx].name||"")+"」？")) return;
    tasks.splice(idx,1); await saveArray("/config/scheduled-tasks",tasks); cfgStatus($st,"已删除"); await reload(0);
  });
  byId("sched-save").addEventListener("click", async ()=>{
    if(!($name.value||"").trim()){ cfgStatus($st,"填一下任务名",true); return; }
    const item=formToTask();
    if(idx>=0) tasks[idx]=item; else { tasks.push(item); idx=tasks.length-1; }
    if(await saveArray("/config/scheduled-tasks",tasks)){ cfgStatus($st,"✓ 已保存"); await reload(idx); } else cfgStatus($st,"保存失败",true);
  });
  byId("sched-send-now").addEventListener("click", ()=>{
    const prompt=($prompt.value||"").trim();
    if(!prompt){ cfgStatus($st,"先填发送内容再试发",true); return; }
    if(busy){ cfgStatus($st,"有对话在进行，稍等下",true); return; }
    const segName=(segments.find(s=>s.key===$seg.value)||{}).name || $seg.value || "全部用户";
    const name=($name.value||"").trim() || "未命名任务";
    cfgStatus($st,"已切到对话里试发 →");
    switchTab("chat");
    ask("【试发定时任务：" + name + " · 目标分层：" + segName + "】\n" + prompt);
  });
  return { async open(){
    segments = await loadArray("/config/segments");   // 每次进来刷新分层下拉
    renderSegOptions();
    if(!loaded){ loaded=true; await reload(0).catch(e=>cfgStatus($st,"加载失败："+e.message,true)); }
    else freqUI();
  } };
})();
